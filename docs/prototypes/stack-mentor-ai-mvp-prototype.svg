  <text x="352" y="440" fill="#334155" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15">作用：监听响应式数据变化并执行回调。</text>
  <text x="352" y="470" fill="#334155" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15">参数：source、callback、options。</text>
  <text x="352" y="500" fill="#334155" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15">返回：停止监听的 stop 函数。</text>
