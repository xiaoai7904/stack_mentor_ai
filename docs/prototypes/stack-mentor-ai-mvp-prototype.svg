  <text x="810" y="440" fill="#334155" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15">watch 让副作用与响应式状态变化解耦。</text>
  <text x="810" y="470" fill="#334155" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15">它通过 scheduler 控制回调触发时机。</text>
